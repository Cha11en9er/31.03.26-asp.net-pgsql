<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>ТГК-2 | Вход в личный кабинет</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div>
            <div class="brand">Портал клиентов ТГК-2</div>
            <div class="brand-sub">Сервисы теплоснабжения и договорная работа</div>
        </div>
    </div>
</header>

<div class="auth-wrap">
    <div class="card">
        <h2>Вход в систему</h2>
        <p class="muted">Введите email и пароль для доступа к каталогу услуг и личному кабинету.</p>
        <input id="email" type="email" autocomplete="username" placeholder="Email" />
        <input id="password" type="password" autocomplete="current-password" placeholder="Пароль" />
        <button class="btn" type="button" onclick="login()">Войти</button>
        <p><a href="register.html">Нет аккаунта? Зарегистрироваться</a></p>
    </div>
</div>

<script>
async function login() {
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });

    if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';
        return;
    }

    if (res.status === 403) {
        const err = await res.json().catch(() => ({}));
        alert(err.message || 'Подтвердите email');
        return;
    }

    alert('Неверный email или пароль');
}
</script>
</body>
</html>
