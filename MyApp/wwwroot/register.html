<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>ТГК-2 | Регистрация</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div>
            <div class="brand">Портал клиентов ТГК-2</div>
            <div class="brand-sub">Создание аккаунта для работы с услугами</div>
        </div>
    </div>
</header>

<div class="auth-wrap">
    <div class="card">
        <h2>Регистрация</h2>
        <p class="muted">После регистрации подтвердите email одноразовым токеном.</p>
        <input id="email" type="email" autocomplete="username" placeholder="Email" />
        <input id="password" type="password" autocomplete="new-password" placeholder="Пароль" />
        <button class="btn" type="button" onclick="register()">Зарегистрироваться</button>
        <p><a href="login.html">Уже есть аккаунт? Войти</a></p>
        <div id="after" style="display:none;">
            <p class="muted">Скопируйте токен и подтвердите email на следующей странице.</p>
            <div class="token-box" id="tok"></div>
            <p><a href="confirm.html">Перейти к подтверждению email</a></p>
        </div>
    </div>
</div>

<script>
async function register() {
    const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });

    if (res.ok) {
        const data = await res.json();
        document.getElementById('after').style.display = 'block';
        document.getElementById('tok').textContent = data.confirmationToken || '';
        return;
    }

    if (res.status === 409) {
        alert('Пользователь уже существует');
        return;
    }

    alert('Ошибка регистрации');
}
</script>
</body>
</html>
