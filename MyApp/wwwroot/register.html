<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>ТГК-2 | Регистрация</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div>
            <div class="brand">Портал клиентов ТГК-2</div>
            <div class="brand-sub">Создание аккаунта для работы с услугами</div>
        </div>
    </div>
</header>

<div class="auth-wrap">
    <div class="card">
        <h2>Регистрация</h2>
        <p class="muted">После регистрации получите код на почту и подтвердите email.</p>
        <input id="email" type="email" autocomplete="username" placeholder="Email" />
        <input id="password" type="password" autocomplete="new-password" placeholder="Пароль" />
        <button class="btn" id="registerBtn" type="button" onclick="register()">Зарегистрироваться</button>
        <p><a href="login.html">Уже есть аккаунт? Войти</a></p>
        <div id="after" style="display:none;">
            <p class="muted" id="mailHint">Код отправлен на email. Перейдите на страницу подтверждения.</p>
            <p><a href="confirm.html">Перейти к подтверждению email</a></p>
        </div>
    </div>
</div>

<script>
async function register() {
    const btn = document.getElementById('registerBtn');
    if (btn.disabled) return;
    btn.disabled = true;
    const initialText = btn.textContent;
    btn.textContent = 'Отправка...';

    try {
        const email = document.getElementById('email').value.trim();
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                password: document.getElementById('password').value
            })
        });

        if (res.ok) {
            await res.json().catch(() => ({}));
            localStorage.setItem('pendingEmailConfirmation', email);
            document.getElementById('mailHint').textContent = `Вам отправлено письмо на ${email}. Введите код из письма на следующем шаге.`;
            document.getElementById('after').style.display = 'block';
            return;
        }

        if (res.status === 409) {
            alert('Пользователь уже существует');
            return;
        }

        const err = await res.json().catch(() => ({}));
        alert(err.message || 'Ошибка регистрации');
    } finally {
        btn.disabled = false;
        btn.textContent = initialText;
    }
}
</script>
</body>
</html>
